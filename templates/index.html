{% extends "base.html" %}
{% block title %}홈{% endblock %}
{% block content %}
  <div class="hero">
    <h1>Tiny Secondhand Platform</h1>
    {% if current_user.is_authenticated %}
      <p>{{ current_user.username }}님 환영합니다.</p>
      <div class="hero-actions">
        <a class="btn btn-primary btn-lg" href="{{ url_for('products.product_list') }}">상품 둘러보기</a>
      </div>
    {% else %}
      <p>중고거래를 시작하려면 로그인하거나 회원가입 해주세요.</p>
      <div class="hero-actions">
        <a class="btn btn-primary btn-lg" href="{{ url_for('auth.register') }}">회원가입</a>
        <a class="btn btn-outline-primary btn-lg" href="{{ url_for('auth.login') }}">로그인</a>
      </div>
    {% endif %}
  </div>
{% endblock %}
