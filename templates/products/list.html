{% extends "base.html" %}
{% block title %}상품 목록{% endblock %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>상품 목록</h1>
    <a class="btn btn-primary" href="{{ url_for('products.product_new') }}">상품 등록</a>
  </div>
  {% if products %}
    <ul class="list-group">
      {% for product in products %}
        <li class="list-group-item">
          <a href="{{ url_for('products.product_detail', product_id=product.id) }}">{{ product.name }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>등록된 상품이 없습니다.</p>
  {% endif %}
{% endblock %}
