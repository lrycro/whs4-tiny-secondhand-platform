{% extends "base.html" %}
{% block title %}{{ other_user.username }}님과의 채팅{% endblock %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center">
    <h1>{{ other_user.username }}님과의 채팅</h1>
    <a class="btn btn-sm btn-outline-danger"
       href="{{ url_for('report.report', target_type='user', target_id=other_user.id) }}">{{ other_user.username }}님 신고</a>
  </div>

  <div id="chat-log" class="border rounded p-3 mb-2" style="height: 400px; overflow-y: auto; background: #f8f9fa;">
    {% for m in history %}
      <div class="chat-message"><strong>{{ m.sender.username }}</strong>: {{ m.content }}</div>
    {% endfor %}
  </div>
  <form id="chat-form" class="d-flex gap-2">
    <input type="text" id="chat-input" class="form-control" maxlength="1000"
           placeholder="메시지를 입력하세요" autocomplete="off">
    <button type="submit" class="btn btn-primary">전송</button>
  </form>
  <div id="chat-error" class="text-danger small mt-1"></div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script>
  (function () {
    var targetUserId = {{ other_user.id | tojson }};
    var chatLog = document.getElementById("chat-log");
    var chatForm = document.getElementById("chat-form");
    var chatInput = document.getElementById("chat-input");
    var chatError = document.getElementById("chat-error");

    function appendMessage(username, content) {
      var div = document.createElement("div");
      div.className = "chat-message";
      var strong = document.createElement("strong");
      strong.textContent = username;
      div.appendChild(strong);
      div.appendChild(document.createTextNode(": " + content));
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    var socket = io();

    socket.on("connect", function () {
      socket.emit("join_room", { target_user_id: targetUserId });
    });

    socket.on("receive_message", function (data) {
      appendMessage(data.sender_username, data.content);
    });

    socket.on("chat_error", function (data) {
      chatError.textContent = data.message;
      setTimeout(function () { chatError.textContent = ""; }, 4000);
    });

    chatForm.addEventListener("submit", function (e) {
      e.preventDefault();
      var content = chatInput.value.trim();
      if (!content) return;
      socket.emit("send_message", { target_user_id: targetUserId, content: content });
      chatInput.value = "";
    });

    chatLog.scrollTop = chatLog.scrollHeight;
  })();
  </script>
{% endblock %}
